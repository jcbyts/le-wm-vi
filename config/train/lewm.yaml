defaults:
  - _self_
  - launcher: local
  - data: pusht
  - model: lewm

output_model_name: lewm
subdir: ${hydra:job.id}

num_workers: 6
train_split: 0.9
seed: 3072
img_size: 224
embed_dim: 192
history_size: 3

trainer:
  max_epochs: 100
  devices: auto
  accelerator: gpu
  precision: bf16
  gradient_clip_val: 1.0

loader:
  batch_size: 128
  num_workers: ${num_workers}
  persistent_workers: True
  prefetch_factor: 3
  pin_memory: True

optimizer:
  type: AdamW
  lr: 5e-5
  weight_decay: 1e-3

num_preds: 1

loss:
  sigreg:
    weight: 0.09
    kwargs:
      knots: 17
      num_proj: 1024

# Behavioral monitoring logged to wandb every `every_n_epochs` (rank 0 only).
# Defaults target PushT; for other datasets adjust env_name / callables / keys_to_cache.
monitor:
  enabled: True
  every_n_epochs: 10
  num_videos: 4
  # -- open-loop latent-rollout error (no env, cheap): multi-step prediction quality
  roll_horizon: 10
  num_latent_batches: 4
  # -- planning success + rollout videos (env + MPC, heavier)
  env_name: swm/PushT-v1
  num_eval: 8
  eval_budget: 50
  goal_offset_steps: 25
  keys_to_cache: [action, proprio, state]
  plan_config:
    horizon: 5
    receding_horizon: 5
    action_block: 5
  cem:
    batch_size: 1
    num_samples: 300
    var_scale: 1.0
    n_steps: 30
    topk: 30
    device: cuda
    seed: 42
  callables:
    - method: _set_state
      args:
        state:
          value: state
    - method: _set_goal_state
      args:
        goal_state:
          value: goal_state
