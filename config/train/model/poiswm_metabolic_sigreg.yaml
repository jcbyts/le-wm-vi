# @package _global_
forward_type: poiswm
output_model_name: poiswm_metabolic_sigreg

model:
  _target_: jepa.MetabolicSigRegPoisWM
  lambda0: 1.0
  alpha: 1.0
  log_rate_min: -12.0
  log_rate_max: 5.0
  target_grid_min: -12.0
  target_grid_max: 5.0
  target_grid_size: 65536
  sigreg_knots: 17
  sigreg_num_proj: 1024
  goal_cost: poisson_kl

  encoder:
    _target_: stable_pretraining.backbone.utils.vit_hf
    size: tiny
    patch_size: 14
    image_size: ${img_size}
    pretrained: false
    use_mask_token: false

  predictor:
    _target_: module.ARPredictor
    num_frames: ${history_size}
    input_dim: ${embed_dim}
    hidden_dim: ${embed_dim}
    output_dim: ${embed_dim}
    depth: 6
    heads: 16
    mlp_dim: 2048
    dim_head: 64
    dropout: 0.1
    emb_dropout: 0.0

  action_encoder:
    _target_: module.Embedder
    input_dim: ???
    emb_dim: ${embed_dim}

  projector:
    _target_: module.MLP
    input_dim: ${embed_dim}
    output_dim: ${embed_dim}
    hidden_dim: 2048
    norm_fn:
      _target_: torch.nn.BatchNorm1d
      _partial_: true

  pred_proj:
    _target_: module.MLP
    input_dim: ${embed_dim}
    output_dim: ${embed_dim}
    hidden_dim: 2048
    norm_fn:
      _target_: torch.nn.BatchNorm1d
      _partial_: true

loss:
  beta: 1.0
  sigreg:
    weight: 0.09
    kwargs:
      knots: 17
      num_proj: 1024
