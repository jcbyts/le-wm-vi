# Gaussian FOND-JEPA (variants 3 & 4). Natural parameter P = 2D = concat(mu, logvar).
# The predictor is "2x wider at the head" (input/output proj = 2D); hidden width,
# depth, heads unchanged from LeWM. The decoder consumes a D-dim sample.
_target_: model.FONDJEPA

latent_dim: ${embed_dim}
head: gaussian
infer_init: static_prior   # only used by the static encode() path (scheme B); scheme A inits at the predictive prior
full_fisher: false         # false = mu-only precision-weighted MSE (gaussian_precision_mse, spec-literal v4)
                           # true  = full 2nd-order Gaussian KL (gaussian_full_fisher_quad)
k_inner: 4
tau: 0.2
infer_lr: 1.0
img_ch: 3
img_hw: ${img_size}

decoder:
  _target_: model.ConvDecoder
  latent_dim: ${embed_dim}
  img_ch: 3
  img_hw: ${img_size}
  grid: 8

predictor:
  _target_: module.ARPredictor
  num_frames: ${history_size}
  input_dim: ${eval:'2 * ${embed_dim}'}
  hidden_dim: ${embed_dim}
  output_dim: ${eval:'2 * ${embed_dim}'}
  depth: 6
  heads: 16
  mlp_dim: 2048
  dim_head: 64
  dropout: 0.1
  emb_dropout: 0.0

action_encoder:
  _target_: module.Embedder
  input_dim: ???
  emb_dim: ${eval:'2 * ${embed_dim}'}
